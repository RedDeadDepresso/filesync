  # ── Windows ──────────────────────────────────────────────────────────────────
  windows:
    needs: setup
    if: needs.setup.outputs.build_windows == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release --no-tree-shake-icons

      - name: Zip release
        shell: pwsh
        run: |
          $version = "${{ needs.setup.outputs.version }}"
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive `
            -Path build\windows\x64\runner\Release\* `
            -DestinationPath dist\filesync-$version-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/
          retention-days: 7

  # ── Linux ────────────────────────────────────────────────────────────────────
  linux:
    needs: setup
    if: needs.setup.outputs.build_linux == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libayatana-appindicator3-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release --no-tree-shake-icons

      - name: Tar release
        run: |
          VERSION=${{ needs.setup.outputs.version }}
          mkdir -p dist
          tar -cJf dist/filesync-${VERSION}-linux-x64.tar.xz \
            -C build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/
          retention-days: 7

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    needs: [setup, android, windows, linux]
    # Run even if some platform jobs were skipped; fail if any ran and errored.
    if: |
      always() &&
      (github.event_name == 'push' ||
       github.event.inputs.publish_release == 'true') &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts/ -type f | while read f; do
            cp "$f" release/
          done
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.version }}
          name: FileSync ${{ needs.setup.outputs.version }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          generate_release_notes: true
          files: release/*
          body: |
            ## FileSync ${{ needs.setup.outputs.version }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | 🤖 Android APK | `filesync-*-android.apk` or `filesync-*.apk` |
            | 🤖 Android AAB (Play Store) | `filesync-*.aab` |
            | 🍎 iOS | `filesync-*.ipa` |
            | 🪟 Windows | `filesync-*-windows.zip` |
            | 🐧 Linux | `filesync-*-linux-x64.tar.xz` |

            ### Notes
            - **Android**: Install the APK directly on your device. The AAB is for Google Play Store submission.
            - **iOS**: Requires a signed IPA. If built without code-signing secrets, the `.zip` contains an unsigned `.app` for simulator testing only.
            - **Windows**: Extract the zip and run `filesync.exe`.
            - **Linux**: Extract the tarball and run `./filesync`.
