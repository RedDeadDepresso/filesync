name: Build & Release

# Triggers:
#   - Push a tag like v1.2.3  →  full build + GitHub Release
#   - Manual dispatch         →  choose platforms and whether to publish
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to build (comma-separated: android,ios,windows,linux)'
        required: false
        default: 'android,ios,windows,linux'
      publish_release:
        description: 'Publish a GitHub Release?'
        type: boolean
        default: false

# ── Shared env ────────────────────────────────────────────────────────────────
env:
  FLUTTER_VERSION: '3.32.0'
  # Set these secrets in your repo → Settings → Secrets and variables → Actions
  # ANDROID_KEYSTORE_BASE64   : base64-encoded JKS/PKCS12 keystore
  # ANDROID_KEY_ALIAS         : key alias inside the keystore
  # ANDROID_KEY_PASSWORD      : key password
  # ANDROID_STORE_PASSWORD    : store password
  # IOS_CERTIFICATE_BASE64    : base64-encoded .p12 distribution certificate
  # IOS_CERTIFICATE_PASSWORD  : .p12 password
  # IOS_PROVISION_PROFILE_BASE64 : base64-encoded .mobileprovision
  # IOS_TEAM_ID               : Apple developer team ID (10-char string)
  # IOS_BUNDLE_ID             : e.g. com.yourcompany.filesync

jobs:
  # ── Determine which platforms to build ──────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      build_android: ${{ steps.parse.outputs.android }}
      build_ios:     ${{ steps.parse.outputs.ios }}
      build_windows: ${{ steps.parse.outputs.windows }}
      build_linux:   ${{ steps.parse.outputs.linux }}
      version:       ${{ steps.version.outputs.value }}
    steps:
      - name: Parse platform list
        id: parse
        run: |
          PLATFORMS="${{ github.event.inputs.platforms || 'android,ios,windows,linux' }}"
          echo "android=$([[ $PLATFORMS == *android* ]] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "ios=$([[ $PLATFORMS == *ios* ]] && echo true || echo false)"         >> $GITHUB_OUTPUT
          echo "windows=$([[ $PLATFORMS == *windows* ]] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "linux=$([[ $PLATFORMS == *linux* ]] && echo true || echo false)"     >> $GITHUB_OUTPUT

      - name: Extract version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "value=dev-$(date +'%Y%m%d')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

  # ── Android ─────────────────────────────────────────────────────────────────
  android:
    needs: setup
    if: needs.setup.outputs.build_android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks

      - name: Write key.properties
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storeFile=keystore.jks
          storePassword=${ANDROID_STORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF

      - name: Build APK (debug – no keystore)
        if: env.ANDROID_KEYSTORE_BASE64 == ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: flutter build apk --release --no-tree-shake-icons

      - name: Build APK + AAB (release – signed)
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          flutter build apk --release --no-tree-shake-icons
          flutter build appbundle --release --no-tree-shake-icons

      - name: Rename artifacts
        run: |
          VERSION=${{ needs.setup.outputs.version }}
          mkdir -p dist
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            cp build/app/outputs/flutter-apk/app-release.apk dist/filesync-${VERSION}.apk
          elif [ -f build/app/outputs/flutter-apk/app-debug.apk ]; then
            cp build/app/outputs/flutter-apk/app-debug.apk dist/filesync-${VERSION}-debug.apk
          fi
          if [ -f build/app/outputs/bundle/release/app-release.aab ]; then
            cp build/app/outputs/bundle/release/app-release.aab dist/filesync-${VERSION}.aab
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist/
          retention-days: 7

